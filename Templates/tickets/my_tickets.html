{% extends 'base.html' %}

{% block title %}Mis Entradas - EventApp{% endblock %}

{% block content %}
<div class="layout-container flex flex-col items-center w-full px-4 md:px-10 py-10">
    <div class="layout-content-container flex flex-col w-full max-w-[800px]">
        
        <h1 class="text-3xl font-black text-text-main dark:text-white mb-8">Mis Entradas</h1>

        <div class="space-y-6">
            
            <div class="flex flex-col md:flex-row bg-white dark:bg-[#2d2434] rounded-2xl overflow-hidden shadow-md border border-gray-200 dark:border-[#3e3446]">
                
                <div class="w-full md:w-1/3 h-40 md:h-auto relative">
                    <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=2070" class="absolute inset-0 w-full h-full object-cover" />
                    <div class="absolute inset-0 bg-primary/20"></div>
                </div>

                <div class="flex-1 p-6 flex flex-col justify-between relative border-r border-dashed border-gray-300 dark:border-gray-600">
                    <div>
                        <h3 class="text-xl font-bold text-text-main dark:text-white">Festival de Verano 2025</h3>
                        <p class="text-primary font-semibold mt-1">Sábado, 15 Agosto • 14:00</p>
                        <p class="text-text-sub text-sm mt-2">Estadio Nacional, Puerta 4</p>
                    </div>
                    <div class="mt-4 flex gap-2">
                        <span class="bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 text-xs font-bold px-2 py-1 rounded">PAGADO</span>
                        <span class="bg-gray-100 text-gray-600 dark:bg-white/10 dark:text-gray-300 text-xs font-bold px-2 py-1 rounded">General</span>
                    </div>

                    <div class="absolute -top-3 -right-3 w-6 h-6 bg-background-light dark:bg-background-dark rounded-full"></div>
                    <div class="absolute -bottom-3 -right-3 w-6 h-6 bg-background-light dark:bg-background-dark rounded-full"></div>
                </div>

                <div class="w-full md:w-[200px] p-6 flex flex-col items-center justify-center bg-gray-50 dark:bg-[#352b3d] border-t md:border-t-0 md:border-l border-dashed border-gray-300 dark:border-gray-600 relative">
                     <div class="md:hidden absolute -top-3 -left-3 w-6 h-6 bg-background-light dark:bg-background-dark rounded-full"></div>
                    <div class="md:hidden absolute -top-3 right-[50%] w-6 h-6 bg-transparent"></div> <div class="bg-white p-2 rounded-lg mb-2">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=Ticket-12345" alt="QR" class="w-24 h-24 opacity-90" />
                    </div>
                    <p class="text-xs text-text-sub font-mono">ID: #839201</p>
                </div>
            </div>
            </div>

    </div>
</div>
{% endblock %}
