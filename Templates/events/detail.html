{% extends 'base.html' %}

{% block title %}Detalle del Evento - EventApp{% endblock %}

{% block content %}
<div id="event-detail-root" data-event-id="{{ event_id }}"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

{% verbatim %}
<script type="text/babel">

    const EventDetail = () => {
        const [event, setEvent] = React.useState(null);
        const [loading, setLoading] = React.useState(true);
        const [error, setError] = React.useState(null);
        const [ticketCount, setTicketCount] = React.useState(1);

        // Leemos el ID que Django dejó en el div
        const rootElement = document.getElementById('event-detail-root');
        const eventId = rootElement ? rootElement.dataset.eventId : null;

        React.useEffect(() => {
            const fetchEvent = async () => {
                if (!eventId) {
                    setError("ID de evento no encontrado");
                    setLoading(false);
                    return;
                }

                try {
                    // Petición GET a la API
                    const response = await axios.get(`/api/events/${eventId}/`);
                    setEvent(response.data);
                    setLoading(false);
                } catch (err) {
                    console.error("Error fetching event:", err);
                    setError("No se pudo cargar la información del evento.");
                    setLoading(false);
                }
            };

            fetchEvent();
        }, [eventId]);

        const handleTicketChange = (operation) => {
            if (operation === 'add') setTicketCount(c => c + 1);
            if (operation === 'sub' && ticketCount > 1) setTicketCount(c => c - 1);
        };

        if (loading) return (
            <div className="flex justify-center items-center h-screen bg-gray-50 dark:bg-[#1e1e2e]">
                <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-purple-600"></div>
            </div>
        );

        if (error) return (
            <div className="flex justify-center items-center h-[50vh] text-red-500 font-bold text-xl">
                {error}
            </div>
        );

        if (!event) return null;

        return (
            <div className="min-h-screen bg-white dark:bg-[#1e1e2e]">
                {/* Hero Section con Imagen */}
                <div className="relative h-[400px] w-full overflow-hidden group">
                    <div className="absolute inset-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent z-10"></div>
                    <img 
                        src={event.image || 'https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=2070'} 
                        className="absolute inset-0 h-full w-full object-cover transition-transform duration-700 group-hover:scale-105" 
                        alt="Event cover" 
                    />
                    
                    <div className="relative z-20 container mx-auto px-4 h-full flex flex-col justify-end pb-12">
                        <span className="bg-purple-600 shadow-lg shadow-purple-600/40 text-white text-xs font-bold px-4 py-1.5 rounded-full w-fit mb-4 uppercase tracking-wider">
                            {event.category || "Evento"}
                        </span>
                        <h1 className="text-4xl md:text-6xl font-black text-white mb-4 drop-shadow-lg leading-tight">
                            {event.title}
                        </h1>
                        <p className="text-gray-200 text-lg md:text-xl flex items-center gap-3 font-medium">
                            <span className="material-symbols-outlined text-purple-400">calendar_today</span>
                            {new Date(event.date).toLocaleDateString('es-PE', { 
                                weekday: 'long', 
                                year: 'numeric', 
                                month: 'long', 
                                day: 'numeric', 
                                hour: '2-digit', 
                                minute:'2-digit' 
                            })}
                        </p>
                    </div>
                </div>

                {/* Contenido Principal */}
                <div className="layout-container flex justify-center px-4 md:px-10 py-12">
                    <div className="flex flex-col lg:flex-row gap-12 w-full max-w-[1200px]">
                        
                        {/* Columna Izquierda: Info */}
                        <div className="flex-1 space-y-10">
                            <section>
                                <h2 className="text-2xl font-bold text-gray-800 dark:text-white mb-6 flex items-center gap-2">
                                    <span className="material-symbols-outlined text-purple-600">info</span>
                                    Acerca del evento
                                </h2>
                                <div className="prose prose-lg dark:prose-invert text-gray-600 dark:text-gray-300 max-w-none">
                                    {/* Aquí estaba el error, ahora arreglado con style={{}} y dentro de verbatim */}
                                    <p style={{whiteSpace: 'pre-line'}}>{event.description}</p>
                                </div>
                            </section>

                            <section>
                                <h2 className="text-2xl font-bold text-gray-800 dark:text-white mb-6 flex items-center gap-2">
                                    <span className="material-symbols-outlined text-purple-600">map</span>
                                    Ubicación
                                </h2>
                                <div className="bg-gray-50 dark:bg-[#2d2434] border border-gray-100 dark:border-[#3e3446] p-6 rounded-2xl flex items-start gap-5 transition hover:shadow-md">
                                    <div className="bg-purple-100 dark:bg-purple-900/30 p-3 rounded-full">
                                        <span className="material-symbols-outlined text-purple-600 text-3xl">location_on</span>
                                    </div>
                                    <div>
                                        <h3 className="font-bold text-xl text-gray-800 dark:text-white mb-1">
                                            {event.location || "Ubicación por definir"}
                                        </h3>
                                        <p className="text-gray-500 dark:text-gray-400">{event.address || "Dirección exacta pendiente"}</p>
                                    </div>
                                </div>
                            </section>
                        </div>

                        {/* Columna Derecha: Ticketera Sticky */}
                        <div className="w-full lg:w-[380px]">
                            <div className="sticky top-24 bg-white dark:bg-[#2d2434] border border-gray-200 dark:border-[#3e3446] rounded-2xl p-6 shadow-2xl shadow-gray-200/50 dark:shadow-black/40">
                                <div className="text-center mb-8 pb-6 border-b border-gray-100 dark:border-gray-700">
                                    <p className="text-sm font-medium text-gray-400 uppercase tracking-wide mb-1">Precio por entrada</p>
                                    <p className="text-4xl font-black text-gray-800 dark:text-white">
                                        ${event.price}
                                        <span className="text-lg text-gray-400 font-normal">.00</span>
                                    </p>
                                </div>

                                <div className="space-y-6 mb-8">
                                    <div className="flex justify-between items-center p-4 bg-gray-50 dark:bg-[#362b3d] rounded-xl border border-transparent hover:border-purple-200 dark:hover:border-purple-800 transition">
                                        <div>
                                            <p className="font-bold text-gray-800 dark:text-white">Entrada General</p>
                                            <p className="text-xs text-gray-500">Acceso completo</p>
                                        </div>
                                        <div className="flex items-center gap-4 bg-white dark:bg-[#2d2434] rounded-lg p-1 shadow-sm">
                                            <button 
                                                onClick={() => handleTicketChange('sub')}
                                                disabled={ticketCount <= 1}
                                                className="w-8 h-8 rounded-md flex items-center justify-center font-bold text-purple-600 hover:bg-purple-50 disabled:opacity-50 disabled:cursor-not-allowed transition"
                                            >-</button>
                                            <span className="font-bold text-lg w-4 text-center dark:text-white">{ticketCount}</span>
                                            <button 
                                                onClick={() => handleTicketChange('add')}
                                                className="w-8 h-8 rounded-md flex items-center justify-center font-bold text-purple-600 hover:bg-purple-50 transition"
                                            >+</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="space-y-3">
                                    <div className="flex justify-between text-sm text-gray-500 mb-2 px-2">
                                        <span>Total a pagar:</span>
                                        <span className="font-bold text-gray-800 dark:text-white text-lg">${event.price * ticketCount}</span>
                                    </div>
                                    
                                    <button id="btn-comprar" className="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 rounded-xl transition-all transform active:scale-95 shadow-lg shadow-purple-600/30 flex items-center justify-center gap-2">
                                        <span>Comprar Entradas</span>
                                        <span className="material-symbols-outlined text-sm">arrow_forward</span>
                                    </button>
                                </div>
                                
                                <p className="text-center text-xs text-gray-400 mt-6 flex items-center justify-center gap-1">
                                    <span className="material-symbols-outlined text-sm">lock</span> 
                                    Transacción encriptada y segura
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('event-detail-root'));
    root.render(<EventDetail />);

</script>
{% endverbatim %}
{% endblock %}
