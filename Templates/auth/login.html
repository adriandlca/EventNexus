{% extends 'base.html' %}

{% block title %}Iniciar Sesión - EventApp{% endblock %}

{% block content %}
<div class="flex min-h-[80vh] items-center justify-center px-4 py-10 bg-background-light dark:bg-background-dark">
    <div id="react-login-root" class="w-full max-w-md"></div>
</div>
{% endblock %}

{% block scripts %}
<script type="text/babel">
    const { useState } = React;

    const LoginForm = () => {
        const [formData, setFormData] = useState({ username: '', password: '' });
        const [error, setError] = useState(null);
        const [loading, setLoading] = useState(false);

        const handleChange = (e) => {
            setFormData({ ...formData, [e.target.name]: e.target.value });
        };

        const handleSubmit = async (e) => {
            e.preventDefault();
            setLoading(true);
            setError(null);

            try {
                // RETO BACKEND: Asegúrate de tener esta URL configurada en urls.py
                const response = await fetch('/api/auth/token/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Credenciales incorrectas");
                }

                // ÉXITO: Guardamos el token
                console.log("Login exitoso, Token:", data.access);
                localStorage.setItem('accessToken', data.access);
                localStorage.setItem('refreshToken', data.refresh);
                
                // Redirigir al usuario
                window.location.href = '/'; 

            } catch (err) {
                setError(err.message);
            } finally {
                setLoading(false);
            }
        };

        return (
            <div className="bg-white dark:bg-[#2d2434] rounded-2xl shadow-xl border border-gray-100 dark:border-[#3e3446] p-8">
                <div className="text-center mb-8">
                    <h1 className="text-2xl font-black text-text-main dark:text-white">Bienvenido de nuevo</h1>
                    <p className="text-text-sub mt-2">Ingresa tus credenciales para continuar</p>
                </div>

                {error && (
                    <div className="mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded text-sm text-center">
                        {error}
                    </div>
                )}

                <form onSubmit={handleSubmit} className="flex flex-col gap-5">
                    <div>
                        <label className="block text-sm font-bold text-text-main dark:text-gray-200 mb-1">Usuario</label>
                        <input 
                            type="text" 
                            name="username"
                            value={formData.username}
                            onChange={handleChange}
                            className="w-full h-12 px-4 rounded-lg border border-gray-300 dark:border-[#3e3446] bg-transparent dark:text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" 
                            required 
                        />
                    </div>

                    <div>
                        <label className="block text-sm font-bold text-text-main dark:text-gray-200 mb-1">Contraseña</label>
                        <input 
                            type="password" 
                            name="password" 
                            value={formData.password}
                            onChange={handleChange}
                            className="w-full h-12 px-4 rounded-lg border border-gray-300 dark:border-[#3e3446] bg-transparent dark:text-white focus:border-primary focus:ring-1 focus:ring-primary outline-none transition" 
                            required 
                        />
                    </div>

                    <button 
                        type="submit" 
                        disabled={loading}
                        className={`w-full bg-primary hover:bg-primary-dark text-white font-bold h-12 rounded-lg transition-colors mt-2 flex items-center justify-center ${loading ? 'opacity-70 cursor-not-allowed' : ''}`}
                    >
                        {loading ? 'Entrando...' : 'Entrar'}
                    </button>
                </form>

                <div className="mt-6 text-center text-sm">
                    <span className="text-text-sub">¿No tienes cuenta?</span>
                    <a href="/register" className="text-primary font-bold hover:underline ml-1">Regístrate aquí</a>
                </div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('react-login-root'));
    root.render(<LoginForm />);
</script>
{% endblock %}
